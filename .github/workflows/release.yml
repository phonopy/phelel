name: Release

# Build sdist + wheel and publish in one shot.
#
# - Push a tag "v*" (e.g. v0.14.0) -> publish to PyPI.
# - Run manually (workflow_dispatch)  -> publish to TestPyPI.
#
# Publishing uses PyPI Trusted Publishing (OIDC); no API token secret is
# needed.  The phelel project must register this workflow as a trusted
# publisher on PyPI and TestPyPI, and the "pypi" / "testpypi" GitHub
# environments must exist.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    name: Build sdist and wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Full history + tags so setuptools_scm derives the version
          # from the pushed "v*" tag instead of a dev/dirty fallback.
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Build sdist and wheel
        run: |
          python -m pip install build
          python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./dist/*

  publish_testpypi:
    name: Publish to TestPyPI
    if: github.event_name == 'workflow_dispatch'
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/phelel
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
          skip-existing: true

  publish_pypi:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/phelel
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v5
        with:
          name: dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
