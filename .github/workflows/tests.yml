name: phelel test using conda-forge environment

on:
  pull_request:
    branches: [develop]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6
      - uses: conda-incubator/setup-miniconda@v4
        with:
          miniforge-version: latest
      - name: Install dependencies
        run: |
          conda activate test
          conda install --yes -c conda-forge python=${{ matrix.python-version }}
          conda install --yes -c conda-forge finufft tomli tomli-w seekpath pytest click codecov pytest-cov matplotlib-base pyyaml h5py numpy scipy spglib cmake c-compiler cxx-compiler maturin
      - name: Install symfc develop branch
        run: |
          conda activate test
          git clone --depth 1 https://github.com/symfc/symfc.git
          cd symfc
          pip install -e . -vvv
          cd ..
      - name: Clone phonors repository
        run: |
          git clone --depth 1 https://github.com/phonopy/phonors.git ../phonors
      - name: Build and install phonors
        run: |
          conda activate test
          cd ../phonors
          maturin develop --release
      - name: Install phonopy develop branch without C extension
        env:
          PHONOPY_NO_C_EXT: "1"
          CMAKE_GENERATOR: "Unix Makefiles"
        run: |
          conda activate test
          git clone https://github.com/phonopy/phonopy.git
          cd phonopy
          pip install -e . -vvv
      - name: Install phono3py without C extension
        env:
          PHONO3PY_NO_C_EXT: "1"
          CMAKE_GENERATOR: "Unix Makefiles"
        run: |
          conda activate test
          git clone https://github.com/phonopy/phono3py.git
          cd phono3py
          pip install -e . -vvv
      - name: Setup phelel
        run: |
          conda activate test
          pip install -e . -vvv
      - name: Test with pytest
        run: |
          conda activate test
          velph --help
          phelel --help
          phelel-load --help
          pytest -v --cov=./ --cov-report=xml test
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          verbose: true
