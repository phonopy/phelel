name: publish phonopy gh-pages

on:
  push:
    branches: [publish-gh-pages]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  docs:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -l {0}
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
    - uses: actions/checkout@v6
    - uses: conda-incubator/setup-miniconda@v3
      with:
        auto-update-conda: true
        channels: conda-forge
        channel-priority: strict
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        conda activate test
        conda install --yes -c conda-forge python=${{ matrix.python-version }}
        conda install --yes -c conda-forge sphinx-book-theme linkify-it-py myst-parser sphinxcontrib-bibtex sphinxcontrib-mermaid ipython
    - name: Build
      run: |
        conda activate test
        sphinx-build doc docs_build
    - name: Upload artifact
      if: ${{ github.ref == 'refs/heads/publish-gh-pages' }}
      uses: actions/upload-pages-artifact@v4
      with:
        path: ./docs_build

  deploy:
    if: ${{ github.ref == 'refs/heads/publish-gh-pages' }}
    needs: docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
